<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digested</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      background: #FAFAFA;
      color: #1A1A1A;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: white;
      border-bottom: 1px solid #E8E8E8;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: #7F77DD;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { display: block; }
    .header h1 { font-size: 15px; font-weight: 700; color: #1A1A1A; }
    .header-badge {
      margin-left: auto;
      font-size: 10px;
      background: #EEEDFE;
      color: #7F77DD;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }

    /* ── Content ── */
    .content { padding: 16px; }

    /* ── Setup screen ── */
    #setup-screen .description {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    #setup-screen .description a {
      color: #7F77DD;
      text-decoration: none;
    }
    #setup-screen .description a:hover { text-decoration: underline; }

    /* ── Save screen ── */
    #save-screen { display: none; }

    /* ── URL preview ── */
    .url-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border: 1px solid #E8E8E8;
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      background: #E8E8E8;
    }
    .url-text {
      font-size: 12px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ── Labels ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    /* ── Inputs ── */
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #E8E8E8;
      border-radius: 8px;
      font-size: 13px;
      color: #1A1A1A;
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px rgba(127,119,221,0.12);
    }
    select { cursor: pointer; }

    .field { margin-bottom: 14px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary {
      background: #7F77DD;
      color: white;
      width: 100%;
    }
    .btn-primary:hover:not(:disabled) { background: #6B63C9; }
    .btn-ghost {
      background: transparent;
      color: #7F77DD;
      font-size: 12px;
      padding: 6px 0;
    }
    .btn-ghost:hover { text-decoration: underline; }

    /* ── Status messages ── */
    .status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .status.success {
      background: #E1F5EE;
      color: #1D9E75;
      display: block;
    }
    .status.error {
      background: #FEE2E2;
      color: #DC2626;
      display: block;
    }
    .status.warning {
      background: #FAEEDA;
      color: #BA7517;
      display: block;
    }

    /* ── Separator ── */
    .sep {
      border: none;
      border-top: 1px solid #E8E8E8;
      margin: 14px 0;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #E8E8E8;
      background: white;
      display: flex;
      justify-content: flex-end;
    }
    .footer-link {
      font-size: 11px;
      color: #999;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
    }
    .footer-link:hover { color: #555; text-decoration: underline; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 4h10M3 8h7M3 12h5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Digested</h1>
    <span class="header-badge" id="header-badge" style="display:none">Connected</span>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen" class="content">
    <p class="description">
      Paste your API token from
      <a id="settings-link" href="#" target="_blank">Digested → Settings</a>
      to connect the extension.
    </p>
    <div class="field">
      <label for="token-input">API Token</label>
      <input
        type="password"
        id="token-input"
        placeholder="Paste your token here…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="field">
      <label for="base-url-input">App URL <span style="font-weight:400;color:#999">(default: localhost:3000)</span></label>
      <input
        type="text"
        id="base-url-input"
        placeholder="https://yourapp.com"
        autocomplete="off"
      />
    </div>
    <button class="btn btn-primary" id="connect-btn">Connect</button>
    <div class="status" id="setup-status"></div>
  </div>

  <!-- Save Screen -->
  <div id="save-screen" class="content">
    <div class="url-preview">
      <img id="favicon" class="favicon" src="" alt="" />
      <span class="url-text" id="current-url">Loading…</span>
    </div>

    <div class="field">
      <label for="folder-select">Save to folder</label>
      <select id="folder-select">
        <option value="">No folder (Inbox)</option>
      </select>
    </div>

    <button class="btn btn-primary" id="save-btn">
      Save to Digested
    </button>
    <div class="status" id="save-status"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-link" id="disconnect-btn" style="display:none">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
